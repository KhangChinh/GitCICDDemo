name: CI/CD - Build & Push Docker Image

on:
  push:
    branches: ["main"]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: B1 - Checkout code
        uses: actions/checkout@v4

      - name: B2 - Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.UIA_SECRET }}

      - name: B3 - Build Docker image
        run: docker build -t ghcr.io/${{ github.repository }}:latest .

      - name: B4 - Push Docker image
        run: docker push ghcr.io/${{ github.repository }}:latest

      - name: B5 - Show result
        run: |
          echo "✅ Docker image pushed successfully!"
          echo "📦 Image: ghcr.io/${{ github.repository }}:latest"
          echo "🐳 Pull command: docker pull ghcr.io/${{ github.repository }}:latest"
