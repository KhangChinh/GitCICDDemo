name: CI/CD - Build & Push Docker Image

on:
  push:
    branches: ["main"]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: B1 - Checkout code
        uses: actions/checkout@v6.0.2

      - name: B2 - Login to DockerHub Container Registry
        uses: docker/login-action@v4.0.0
        with:
          username: khangchinh
          password: ${{ secrets.UIA_SECRET }}

      - name: B3 - Build Docker image
        run: docker build -t khangchinh/gitcicddemo:latest .

      - name: B4 - Push Docker image
        run: docker push khangchinh/gitcicddemo:latest

      - name: B5 - Show result
        run: |
          echo "Docker image pushed successfully!"
          echo "Image: khangchinh/gitcicddemo:latest"
          echo "Pull command: docker pull khangchinh/gitcicddemo:latest"
